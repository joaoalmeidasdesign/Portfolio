<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      (function redirectToApp() {
        var path = window.location.pathname || "/";
        var basePath = path.startsWith("/Portfolio/") ? "/Portfolio" : "";
        var appPath = basePath && path === basePath ? "/" : path.slice(basePath.length) || "/";
        var target = appPath + window.location.search + window.location.hash;
        var redirectUrl =
          window.location.origin +
          basePath +
          "/?redirect=" +
          encodeURIComponent(target);

        window.location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
